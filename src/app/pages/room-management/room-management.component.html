<div class="room-management-container">
  <!-- Page Header -->
  <div class="page-header">
    <div class="header-content">
      <div class="header-left">
        <h1 class="page-title">Quản lý phòng họp</h1>
        <p class="page-subtitle">Danh sách và trạng thái phòng họp</p>
      </div>
      <div class="header-right">
        <button nz-button nzType="primary" nzSize="large" (click)="onAddRoom()">
          <span nz-icon nzType="plus" nzTheme="outline"></span>
          Thêm phòng họp
        </button>
      </div>
    </div>
  </div>

  <!-- Filter Component -->
  <app-room-filter
    [filterCriteria]="filterCriteria"
    [capacityRangeOptions]="capacityRangeOptions"
    [roomTypeOptions]="roomTypeOptions"
    [statusOptions]="statusOptions"
    [showFilterPanel]="showFilterPanel"
    (filterChange)="onFilterChange()"
    (applyFilter)="onApplyFilter()"
    (resetFilter)="onResetFilter()"
    (exportData)="onExportData()"
    (togglePanel)="toggleFilterPanel()">
  </app-room-filter>

  <!-- Table Component -->
  <app-room-table
    [rooms]="filteredRooms"
    [loading]="loading"
    [total]="total"
    [pageIndex]="pageIndex"
    [pageSize]="pageSize"
    [pageSizeOptions]="pageSizeOptions"
    [(sortField)]="sortField"
    [(sortOrder)]="sortOrder"
    [sortFieldOptions]="sortFieldOptions"
    [sortOrderOptions]="sortOrderOptions"
    (pageIndexChange)="onPageIndexChange($event)"
    (pageSizeChange)="onPageSizeChange($event)"
    (sortChange)="onSortChange()"
    (viewRoom)="onViewRoom($event)"
    (editRoom)="onEditRoom($event)"
    (deleteRoom)="onDeleteRoom($event)">
  </app-room-table>

  <!-- Form Modal Component -->
  <app-room-form-modal
    [(visible)]="isModalVisible"
    [isSubmitting]="isSubmitting"
    [currentUsername]="currentUsername"
    (onSubmit)="handleModalSubmit($event)"
    (onCancel)="handleModalCancel()">
  </app-room-form-modal>

  <!-- Detail Modal Component -->
  <app-room-detail-modal
    [(visible)]="isDetailModalVisible"
    [room]="selectedRoom">
  </app-room-detail-modal>
</div>
