<nz-modal
  [(nzVisible)]="visible"
  nzTitle="Thêm nhân viên mới"
  nzWidth="700px"
  [nzMaskClosable]="false"
  [nzClosable]="true"
  [nzFooter]="modalFooter"
  (nzOnCancel)="handleCancel()">
  
  <ng-container *nzModalContent>
    <form nz-form [formGroup]="employeeForm" nzLayout="vertical">
      <div nz-row [nzGutter]="16">
        <!-- Username -->
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label nzRequired>Tên đăng nhập</nz-form-label>
            <nz-form-control nzErrorTip="Vui lòng nhập tên đăng nhập (3-50 ký tự)">
              <nz-input-group nzPrefixIcon="user">
                <input
                  nz-input
                  formControlName="username"
                  placeholder="Nhập tên đăng nhập"
                  autocomplete="off" />
              </nz-input-group>
            </nz-form-control>
          </nz-form-item>
        </div>

        <!-- Password -->
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label nzRequired>Mật khẩu</nz-form-label>
            <nz-form-control nzErrorTip="Vui lòng nhập mật khẩu (tối thiểu 6 ký tự)">
              <nz-input-group nzPrefixIcon="lock" [nzSuffix]="suffixTemplate">
                <input
                  nz-input
                  formControlName="password"
                  [type]="passwordVisible ? 'text' : 'password'"
                  placeholder="Nhập mật khẩu"
                  autocomplete="new-password" />
              </nz-input-group>
              <ng-template #suffixTemplate>
                <span
                  nz-icon
                  [nzType]="passwordVisible ? 'eye-invisible' : 'eye'"
                  (click)="passwordVisible = !passwordVisible"
                  class="password-toggle">
                </span>
              </ng-template>
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>

      <div nz-row [nzGutter]="16">
        <!-- First Name (Họ) -->
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label nzRequired>Họ</nz-form-label>
            <nz-form-control nzErrorTip="Vui lòng nhập họ">
              <nz-input-group nzPrefixIcon="user">
                <input
                  nz-input
                  formControlName="firstName"
                  placeholder="Nguyễn Văn"
                  autocomplete="given-name" />
              </nz-input-group>
            </nz-form-control>
          </nz-form-item>
        </div>

        <!-- Last Name (Tên) -->
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label nzRequired>Tên</nz-form-label>
            <nz-form-control nzErrorTip="Vui lòng nhập tên">
              <nz-input-group nzPrefixIcon="user">
                <input
                  nz-input
                  formControlName="lastName"
                  placeholder="An"
                  autocomplete="family-name" />
              </nz-input-group>
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>

      <div nz-row [nzGutter]="16">
        <!-- Email -->
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label nzRequired>Email</nz-form-label>
            <nz-form-control nzErrorTip="Vui lòng nhập email hợp lệ">
              <nz-input-group nzPrefixIcon="mail">
                <input
                  nz-input
                  formControlName="email"
                  placeholder="example@company.com"
                  autocomplete="email" />
              </nz-input-group>
            </nz-form-control>
          </nz-form-item>
        </div>
        <!-- Phone Number -->
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label nzRequired>Số điện thoại</nz-form-label>
            <nz-form-control nzErrorTip="Vui lòng nhập số điện thoại (10-11 số)">
              <nz-input-group nzPrefixIcon="phone">
                <input
                  nz-input
                  formControlName="phoneNumber"
                  placeholder="0987654321"
                  autocomplete="tel" />
              </nz-input-group>
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>

      <div nz-row [nzGutter]="16">
        <!-- Unit Code -->
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label nzRequired>Đơn vị</nz-form-label>
            <nz-form-control nzErrorTip="Vui lòng chọn đơn vị">
              <nz-select
                formControlName="unitCode"
                nzPlaceHolder="Chọn đơn vị"
                nzShowSearch>
                <nz-option
                  *ngFor="let unit of unitOptions"
                  [nzValue]="unit.value"
                  [nzLabel]="unit.label">
                </nz-option>
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>
        <!-- Job Title -->
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label nzRequired>Chức danh</nz-form-label>
            <nz-form-control nzErrorTip="Vui lòng nhập chức danh">
              <nz-input-group nzPrefixIcon="solution">
                <input
                  nz-input
                  formControlName="jobTitle"
                  placeholder="Nhập chức danh"
                  autocomplete="organization-title" />
              </nz-input-group>
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>

      <div nz-row [nzGutter]="16">

        <!-- Role Code -->
        <div nz-col [nzSpan]="12">
          <nz-form-item>
            <nz-form-label nzRequired>Vai trò</nz-form-label>
            <nz-form-control nzErrorTip="Vui lòng chọn vai trò">
              <nz-select
                formControlName="roleCode"
                nzPlaceHolder="Chọn vai trò">
                <nz-option
                  *ngFor="let role of roleOptions"
                  [nzValue]="role.value"
                  [nzLabel]="role.label">
                </nz-option>
              </nz-select>
            </nz-form-control>
          </nz-form-item>
        </div>
      </div>
    </form>
  </ng-container>

  <ng-template #modalFooter>
    <button nz-button nzType="default" (click)="handleCancel()" [disabled]="isSubmitting">
      Hủy
    </button>
    <button
      nz-button
      nzType="primary"
      (click)="handleSubmit()"
      [nzLoading]="isSubmitting">
      Thêm nhân viên
    </button>
  </ng-template>
</nz-modal>
