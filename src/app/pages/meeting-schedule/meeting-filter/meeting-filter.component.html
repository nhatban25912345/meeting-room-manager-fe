<div class="filter-panel" [class.collapsed]="!showFilterPanel">
  <div class="filter-header" (click)="onTogglePanel()">
    <div class="filter-header-left">
      <span nz-icon nzType="filter" nzTheme="outline" class="filter-icon"></span>
      <h3>Thông tin tìm kiếm</h3>
    </div>
    <button nz-button nzType="text" nzSize="small" (click)="onTogglePanel(); $event.stopPropagation()">
      <span nz-icon [nzType]="showFilterPanel ? 'up' : 'down'" nzTheme="outline"></span>
    </button>
  </div>

  <div class="filter-content" *ngIf="showFilterPanel">
    <form nz-form [formGroup]="searchForm" (ngSubmit)="onSearch()">
      <div class="filter-grid">
        <!-- Room Type -->
        <div class="filter-item filter-item-full">
          <label class="filter-label">Chọn loại phòng</label>
          <nz-radio-group formControlName="roomType">
            <label nz-radio nzValue="all">Tất cả các loại phòng</label>
            <label nz-radio nzValue="managed">Phòng họp được quản lý</label>
            <label nz-radio nzValue="unmanaged">Phòng họp không được quản lý</label>
          </nz-radio-group>
        </div>

        <!-- Meeting Owner -->
        <div class="filter-item">
          <label class="filter-label">Chủ đề cuộc họp</label>
          <input 
            nz-input 
            formControlName="meetingOwner" 
            placeholder="Nhập chủ đề cuộc họp" 
          />
        </div>

        <!-- Participants -->
        <div class="filter-item">
          <label class="filter-label">Cá nhân tham gia</label>
          <input 
            nz-input 
            formControlName="participants" 
            placeholder="Nhập tên người tham gia"
          />
        </div>

        <!-- Participating Unit -->
        <div class="filter-item">
          <label class="filter-label">Đơn vị tham gia</label>
          <input 
            nz-input 
            formControlName="participatingUnit" 
            placeholder="Nhập tên đơn vị"
          />
        </div>

        <!-- Schedule Type -->
        <div class="filter-item">
          <label class="filter-label">Lịch định kỳ</label>
          <nz-select formControlName="scheduleType" nzPlaceHolder="Chọn loại lịch">
            <nz-option nzValue="all" nzLabel="Tất cả"></nz-option>
            <nz-option nzValue="recurring" nzLabel="Định kỳ"></nz-option>
            <nz-option nzValue="one-time" nzLabel="Một lần"></nz-option>
          </nz-select>
        </div>

        <!-- Status -->
        <div class="filter-item">
          <label class="filter-label">Trạng thái</label>
          <nz-select formControlName="status" nzPlaceHolder="Chọn trạng thái">
            <nz-option *ngFor="let status of statusOptions" [nzValue]="status.value" [nzLabel]="status.label"></nz-option>
          </nz-select>
        </div>

        <!-- Meeting Type -->
        <div class="filter-item">
          <label class="filter-label">Loại lịch</label>
          <nz-select formControlName="meetingType" nzPlaceHolder="Chọn loại lịch">
            <nz-option nzValue="all" nzLabel="Tất cả"></nz-option>
            <nz-option nzValue="internal" nzLabel="Nội bộ"></nz-option>
            <nz-option nzValue="external" nzLabel="Đối ngoại"></nz-option>
            <nz-option nzValue="mixed" nzLabel="Hỗn hợp"></nz-option>
          </nz-select>
        </div>

        <!-- Meeting Time Range -->
        <div class="filter-item filter-item-wide">
          <label class="filter-label">Thời gian họp</label>
          <div class="date-range-group">
            <nz-date-picker 
              formControlName="timeFrom" 
              nzPlaceHolder="Từ ngày"
              [nzFormat]="'dd/MM/yyyy'">
            </nz-date-picker>
            <span class="date-separator">~</span>
            <nz-date-picker 
              formControlName="timeTo" 
              nzPlaceHolder="Đến ngày"
              [nzFormat]="'dd/MM/yyyy'">
            </nz-date-picker>
          </div>
        </div>

        <!-- Created Date Range -->
        <div class="filter-item filter-item-wide">
          <label class="filter-label">Ngày tạo</label>
          <div class="date-range-group">
            <nz-date-picker 
              formControlName="createdFrom"
              nzPlaceHolder="Từ ngày"
              [nzFormat]="'dd/MM/yyyy'">
            </nz-date-picker>
            <span class="date-separator">~</span>
            <nz-date-picker 
              formControlName="createdTo"
              nzPlaceHolder="Đến ngày"
              [nzFormat]="'dd/MM/yyyy'">
            </nz-date-picker>
          </div>
        </div>
      </div>

      <!-- Filter Actions -->
      <div class="filter-actions">
        <button nz-button nzType="primary" type="submit">
          <span nz-icon nzType="search" nzTheme="outline"></span>
          Tìm kiếm
        </button>
        <button nz-button type="button" (click)="onResetFilter()">
          <span nz-icon nzType="reload" nzTheme="outline"></span>
          Làm mới
        </button>
        <button nz-button nzType="default" type="button" (click)="onExportData()">
          <span nz-icon nzType="download" nzTheme="outline"></span>
          Xuất báo cáo
        </button>
      </div>
    </form>
  </div>
</div>
