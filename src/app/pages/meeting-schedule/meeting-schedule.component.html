<div class="meeting-schedule-container">
  <!-- Page Header -->
  <div class="page-header">
    <div class="header-content">
      <div class="header-left">
        <h1 class="page-title">Lịch họp</h1>
        <p class="page-subtitle">Quản lý và tra cứu lịch họp</p>
      </div>
    </div>
  </div>

  <!-- Filter Component -->
  <app-meeting-filter
    [searchForm]="searchForm"
    [statusOptions]="statusOptions"
    [roomCodeOptions]="roomCodeOptions"
    [showFilterPanel]="showFilterPanel"
    (search)="search()"
    (resetFilter)="resetFilter()"
    (exportData)="exportData()"
    (togglePanel)="toggleFilterPanel()">
  </app-meeting-filter>

  <!-- Table Component -->
  <app-meeting-table
    [meetingGroups]="meetingGroups"
    [loading]="loading"
    [totalMeetings]="totalMeetings"
    [statusOptions]="statusOptions"
    (toggleGroup)="toggleGroup($event)"
    (viewDetails)="viewDetails($event)"
    (editMeeting)="editMeeting($event)"
    (deleteMeeting)="deleteMeeting($event)">
  </app-meeting-table>
</div>
